stages:
    - .pre
    - lint
    - build
    - test
    - security
    - publish

include:
    # GitLab-managed dependency/SAST scanning (Phase 7.5) — auto-detects the Java (Maven) and
    # Node projects in this repo and adds its own jobs to the `test`/`security` stages. Simpler
    # and lower-maintenance than hand-rolling `mvn org.owasp:dependency-check` (which needs an
    # NVD API key and network access to a vulnerability feed) for a repo this size.
    - template: Security/SAST.gitlab-ci.yml
    - template: Security/Dependency-Scanning.gitlab-ci.yml

### FRONTEND STARTS ###
# This works with any React JS project that is scaffolded using Vite JS
npm_install:
    stage: .pre
    image: node:latest
    cache:
        paths:
            - frontend/node_modules/
    script:
        - cd frontend && npm install

frontend_lint:
    stage: lint
    image: node:latest
    cache:
        paths:
            - frontend/node_modules/
    script:
        - cd frontend
        - npm run lint

frontend_typecheck:
    stage: lint
    image: node:latest
    cache:
        paths:
            - frontend/node_modules/
    script:
        - cd frontend
        # NOT `tsc --noEmit` — the root tsconfig.json is a solution file (`"files": []` +
        # `references` only) that plain `tsc` silently no-ops on without `-b`. This is the
        # invocation that actually typechecks the app (see TODO-PROD.md Phase 6.5's note on the
        # same discovery) — a real type error here must fail the pipeline, not pass it silently.
        - npx tsc --noEmit -p tsconfig.app.json

pages:
    stage: build
    image: node:latest
    cache:
        paths:
            - frontend/node_modules/
    script:
        - cd frontend
        - npm run build
        - mkdir -p ../public
        - cp -r dist/* ../public/
    artifacts:
        paths:
            - public
### FRONTEND ENDS ###

### BACKEND TESTS START ###
# Both services' test suites include Testcontainers-based integration tests (real Postgres via
# PostgresTestContainerBase) alongside plain unit tests — previously this CI file never touched
# either backend at all, so none of that ran anywhere except a developer's own machine. Testcontainers
# just needs a reachable Docker daemon (it talks to the Docker API directly, not the `docker` CLI),
# which docker:dind provides here.
.backend_test:
    stage: test
    image: maven:3.9-eclipse-temurin-21
    services:
        - docker:24-dind
    variables:
        DOCKER_HOST: tcp://docker:2375
        DOCKER_TLS_CERTDIR: ""
        TESTCONTAINERS_HOST_OVERRIDE: docker
    cache:
        key: "$CI_JOB_NAME"
        paths:
            - .m2/repository
    script:
        - mvn -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -f $SERVICE_DIR/pom.xml test

documentation-bot_test:
    extends: .backend_test
    variables:
        SERVICE_DIR: documentation-bot

document-ingestor_test:
    extends: .backend_test
    variables:
        SERVICE_DIR: document-ingestor
### BACKEND TESTS END ###

### INTEGRATION CLIENTS START ###
# Node bots have no test suite yet (Phase 7.6+) — `--if-present` keeps this job green rather than
# failing on a missing script, while still catching a broken `npm ci` (bad lockfile, missing
# dependency) and, once tests do exist, actually running them.
.node_bot_check:
    stage: test
    image: node:latest
    script:
        - cd $SERVICE_DIR
        # `npm install`, not `npm ci` — none of these subprojects have a committed
        # package-lock.json yet (same as this repo's existing frontend CI job, which also uses
        # `npm install`); `npm ci` hard-requires one and fails outright without it.
        - npm install
        - npm test --if-present

slack-bot_check:
    extends: .node_bot_check
    variables:
        SERVICE_DIR: slack-bot

teams-bot_check:
    extends: .node_bot_check
    variables:
        SERVICE_DIR: teams-bot

vscode-extension_check:
    stage: test
    image: node:latest
    script:
        - cd vscode-extension
        - npm install
        - npm run lint
        - npm run compile

browser-extension_check:
    stage: test
    image: node:latest
    script:
        - cd browser-extension
        # No build step for this one (plain manifest v3 JS, no bundler) — validate the manifest
        # is well-formed JSON and every script at least parses, which is what CI can catch before
        # a syntax error ships (functional testing needs a real browser, out of scope for CI).
        - node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json OK')"
        - node --check background.js
        - node --check content.js
        - node --check popup.js
### INTEGRATION CLIENTS END ###

### DOCKER IMAGE BUILDS START ###
# Only on tags — a merge-request/branch pipeline runs lint/typecheck/tests but doesn't push
# images; publishing is a deliberate, tagged-release action.
.docker_build:
    stage: publish
    image: docker:24
    services:
        - docker:24-dind
    variables:
        DOCKER_HOST: tcp://docker:2375
        DOCKER_TLS_CERTDIR: ""
    rules:
        - if: $CI_COMMIT_TAG
    script:
        - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        - docker build -t "$CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_TAG" -t "$CI_REGISTRY_IMAGE/$IMAGE_NAME:latest" $BUILD_CONTEXT
        - docker push "$CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_TAG"
        - docker push "$CI_REGISTRY_IMAGE/$IMAGE_NAME:latest"

documentation-bot_image:
    extends: .docker_build
    variables:
        IMAGE_NAME: documentation-bot
        BUILD_CONTEXT: documentation-bot

document-ingestor_image:
    extends: .docker_build
    variables:
        IMAGE_NAME: document-ingestor
        BUILD_CONTEXT: document-ingestor

frontend_image:
    extends: .docker_build
    variables:
        IMAGE_NAME: frontend
        BUILD_CONTEXT: frontend
### DOCKER IMAGE BUILDS END ###
