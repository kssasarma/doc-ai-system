stages:
    - .pre
    - build
    - test

### FRONTEND STARTS ###
# This works with any React JS project that is scaffolded using Vite JS
npm_install:
    stage: .pre
    image: node:latest
    cache:
        paths:
            - frontend/node_modules/
    script:
        - cd frontend && npm install

pages:
    stage: build
    image: node:latest
    cache:
        paths:
            - frontend/node_modules/
    script:
        - cd frontend
        - npm run build
        - mkdir -p ../public
        - cp -r dist/* ../public/
    artifacts:
        paths:
            - public
### FRONTEND ENDS ###

### BACKEND TESTS START ###
# Both services' test suites include Testcontainers-based integration tests (real Postgres via
# PostgresTestContainerBase) alongside plain unit tests — previously this CI file never touched
# either backend at all, so none of that ran anywhere except a developer's own machine. Testcontainers
# just needs a reachable Docker daemon (it talks to the Docker API directly, not the `docker` CLI),
# which docker:dind provides here.
.backend_test:
    stage: test
    image: maven:3.9-eclipse-temurin-21
    services:
        - docker:24-dind
    variables:
        DOCKER_HOST: tcp://docker:2375
        DOCKER_TLS_CERTDIR: ""
        TESTCONTAINERS_HOST_OVERRIDE: docker
    cache:
        key: "$CI_JOB_NAME"
        paths:
            - .m2/repository
    script:
        - mvn -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -f $SERVICE_DIR/pom.xml test

documentation-bot_test:
    extends: .backend_test
    variables:
        SERVICE_DIR: documentation-bot

document-ingestor_test:
    extends: .backend_test
    variables:
        SERVICE_DIR: document-ingestor
### BACKEND TESTS END ###
