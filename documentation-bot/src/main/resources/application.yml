spring:
  application:
    name: documentation-bot

  datasource:
    url: ${SPRING_DATABASE_URL:jdbc:postgresql://localhost:5432/docai}
    username: ${SPRING_DATABASE_USERNAME:postgres}
    password: ${SPRING_DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_bot
    baseline-on-migrate: true
    # Flyway never actually ran in this environment before now (missing spring-boot-starter-flyway —
    # Spring Boot 4 split the autoconfiguration out of flyway-core). The live schema already matches
    # V1-V12 (previously applied via Hibernate ddl-auto=update, before it was switched to 'none').
    # Baselining at 12 makes only V13+ pending here; baseline is ignored entirely for a genuinely
    # empty/fresh database, where migrate() still runs V1 onward normally.
    baseline-version: 12

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
            required: ${MAIL_STARTTLS_REQUIRED:true}

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.7
          max-tokens: 5000
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          encodingFormat: float
    # Phase 7.4 — Anthropic Claude (optional; omit key to disable)
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_CHAT_MODEL:claude-sonnet-4-6}

  # Phase 7.5 — Redis (optional; omit host to disable embedding cache)
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

server:
  port: 8082

app:
  jwt:
    # Default is for local dev only — always set JWT_SECRET in production
    secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItZG9jYWktc3lzdGVtLWp3dC10b2tlbnMtMjAyNA==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    # Refresh tokens outlive the access token by design (30 days default) so a session survives
    # browser restarts — the frontend silently renews the access token in the background well
    # before it expires, only falling back to a full re-login once the refresh token itself dies.
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  seed-admin:
    # First-run SUPER_ADMIN, created by AdminSeeder when the users table is empty.
    # Must change password on first login — override via env vars in production.
    username: ${SEED_ADMIN_USERNAME:admin}
    email: ${SEED_ADMIN_EMAIL:admin@docs-inator.local}
    password: ${SEED_ADMIN_PASSWORD:Opentext123$}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_PER_MINUTE:30}
    # Per-IP, unauthenticated — /api/auth/login and /api/auth/refresh. Deliberately separate
    # (and tighter) than the per-user chat limit above; see RateLimitFilter.
    auth-requests-per-minute: ${AUTH_RATE_LIMIT_PER_MINUTE:10}
  auth:
    # Brute-force lockout (UserService.authenticate) — independent of the per-IP rate limit above,
    # since that one won't catch an attacker spreading guesses across many IPs at one account.
    max-failed-attempts: ${AUTH_MAX_FAILED_ATTEMPTS:10}
    lockout-duration-minutes: ${AUTH_LOCKOUT_DURATION_MINUTES:15}
  secrets:
    # AES-256 key (base64, 32 bytes) for encrypting per-tenant LLM API keys and integration
    # tokens at rest. Optional here (dev generates an ephemeral key); required in prod — see
    # application-prod.yml. Generate with: openssl rand -base64 32
    encryption-key: ${SECRETS_ENCRYPTION_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      # Explicit rather than relying on Spring Boot's Kubernetes auto-detection (which only
      # enables these when KUBERNETES_SERVICE_HOST is present) — the split liveness/readiness
      # groups below must respond the same way everywhere the k8s manifests point probes at
      # them, and this makes that independent of the deployment platform.
      probes:
        enabled: true
  health:
    mail:
      enabled: false
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

digest:
  from-address: ${MAIL_FROM:noreply@docs-inator.example.com}
  from-name: ${MAIL_FROM_NAME:Docs-inator}
  app-url: ${APP_URL:http://localhost:5173}

bot:
  max-context-messages: 10
  summary-threshold: 15
  top-k-results: 7
  chat-expiry-hours: 24
  max-context-tokens: 20000
  min-similarity-threshold: ${BOT_MIN_SIMILARITY_THRESHOLD:0.55}
  cost:
    input-per-1k-tokens: ${BOT_COST_INPUT_PER_1K:0.00015}
    output-per-1k-tokens: ${BOT_COST_OUTPUT_PER_1K:0.00060}
  internal:
    # document-ingestor's internal API base URL, and the shared secret this service signs its
    # calls to it with (must match document-ingestor's own INTERNAL_SERVICE_SECRET) — see
    # InternalDocumentDownloadService. Backs "open citation" in the chat UI.
    ingestor-url: ${INGESTOR_INTERNAL_URL:http://document-ingestor:8081}
    service-secret: ${INTERNAL_SERVICE_SECRET:}

