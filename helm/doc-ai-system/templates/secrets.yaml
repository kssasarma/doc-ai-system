apiVersion: v1
kind: Secret
metadata:
  name: doc-ai-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
data:
  SPRING_DATABASE_USERNAME: {{ .Values.secrets.dbUsername | b64enc | quote }}
  SPRING_DATABASE_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  SEED_ADMIN_PASSWORD: {{ .Values.secrets.seedAdminPassword | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | b64enc | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | b64enc | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | b64enc | quote }}
  S3_BUCKET: {{ .Values.secrets.s3Bucket | b64enc | quote }}
  MAIL_USERNAME: {{ .Values.secrets.mailUsername | b64enc | quote }}
  MAIL_PASSWORD: {{ .Values.secrets.mailPassword | b64enc | quote }}
