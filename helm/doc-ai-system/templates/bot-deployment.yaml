apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentation-bot
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.bot.replicaCount }}
  selector:
    matchLabels:
      app: documentation-bot
  template:
    metadata:
      labels:
        app: documentation-bot
    spec:
      containers:
        - name: documentation-bot
          image: {{ .Values.global.imageRegistry }}/{{ .Values.bot.image.repository }}:{{ .Values.bot.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: doc-ai-config
            - secretRef:
                name: doc-ai-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: documentation-bot-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: documentation-bot
  ports:
    - port: 8082
      targetPort: 8082
{{- if .Values.bot.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: documentation-bot-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: documentation-bot
  minReplicas: {{ .Values.bot.hpa.minReplicas }}
  maxReplicas: {{ .Values.bot.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.bot.hpa.cpuUtilization }}
{{- end }}
