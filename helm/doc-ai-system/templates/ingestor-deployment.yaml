apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-ingestor
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.ingestor.replicaCount }}
  selector:
    matchLabels:
      app: document-ingestor
  template:
    metadata:
      labels:
        app: document-ingestor
    spec:
      containers:
        - name: document-ingestor
          image: {{ .Values.global.imageRegistry }}/{{ .Values.ingestor.image.repository }}:{{ .Values.ingestor.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: doc-ai-config
            - secretRef:
                name: doc-ai-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ingestor.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: document-ingestor-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: document-ingestor
  ports:
    - port: 8081
      targetPort: 8081
{{- if .Values.ingestor.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-ingestor-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-ingestor
  minReplicas: {{ .Values.ingestor.hpa.minReplicas }}
  maxReplicas: {{ .Values.ingestor.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingestor.hpa.cpuUtilization }}
{{- end }}
