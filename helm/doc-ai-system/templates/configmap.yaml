apiVersion: v1
kind: ConfigMap
metadata:
  name: doc-ai-config
  namespace: {{ .Values.global.namespace }}
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATABASE_URL: "jdbc:postgresql://postgres-service:5432/docai"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  OPENAI_BASE_URL: "https://api.openai.com"
  OPENAI_CHAT_MODEL: {{ .Values.config.openaiChatModel | quote }}
  OPENAI_EMBEDDING_MODEL: {{ .Values.config.openaiEmbeddingModel | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  APP_URL: {{ .Values.config.appUrl | quote }}
  STORAGE_TYPE: {{ .Values.config.storageType | quote }}
  # Real AWS S3, not MinIO, in-cluster — leave S3_ENDPOINT empty so the SDK resolves the
  # standard regional endpoint, and keep virtual-hosted (non-path-style) addressing. Matches
  # k8s/configmap.yaml — see its comment for the same reasoning.
  S3_REGION: {{ .Values.config.s3Region | quote }}
  S3_ENDPOINT: ""
  S3_PATH_STYLE_ACCESS: "false"
  RATE_LIMIT_PER_MINUTE: {{ .Values.config.rateLimitPerMinute | quote }}
