global:
  imageRegistry: "your-registry"
  imagePullPolicy: IfNotPresent
  namespace: doc-ai

# Default-deny + explicit-allow NetworkPolicies (Phase 7.3). Disable only if your cluster's CNI
# doesn't enforce NetworkPolicy (plain kubenet, some managed defaults) — deploying them there
# would give a false sense of enforcement rather than actually doing nothing.
networkPolicy:
  enabled: true

# ── documentation-bot ──────────────────────────────────────────────────────────
bot:
  image:
    repository: documentation-bot
    # Always pin an explicit release tag in a real deployment — never `latest`, which makes
    # rollbacks and "what's actually running" both unanswerable. Override per release, e.g.
    # `--set bot.image.tag=v1.2.0` (see the README's Helm upgrade example).
    tag: "1.0.0"
  replicaCount: 2
  resources:
    requests:
      cpu: "500m"
      memory: "768Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70

# ── document-ingestor ──────────────────────────────────────────────────────────
ingestor:
  image:
    repository: document-ingestor
    # Same reasoning as bot.image.tag above — pin per release, don't ship `latest`.
    tag: "1.0.0"
  replicaCount: 2
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "3Gi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    cpuUtilization: 70

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
postgres:
  enabled: true
  image: pgvector/pgvector:pg16
  storageSize: "50Gi"
  storageClass: ""   # use cluster default
  backup:
    # Nightly pg_dump -> the S3 bucket in secrets.s3Bucket, under backups/. Only meaningful (and
    # only deployed) when postgres.enabled is true — an external managed DB's backups are that
    # operator's job, not this chart's.
    enabled: true
    schedule: "0 3 * * *"
    retentionDays: 14

# ── Redis ──────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  resources:
    limits:
      memory: "512Mi"

# ── Ingress ────────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: api.your-domain.com
  tlsSecret: doc-ai-tls
  certIssuer: letsencrypt-prod

# ── Secrets (override in CI/CD or use external-secrets) ───────────────────────
secrets:
  dbUsername: ""
  dbPassword: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  jwtSecret: ""
  seedAdminPassword: ""
  redisPassword: ""
  # Real AWS IAM credentials for the S3 bucket below — not MinIO (see config.storageType/s3Region).
  s3AccessKey: ""
  s3SecretKey: ""
  s3Bucket: "docai-documents"
  mailUsername: ""
  mailPassword: ""

# ── Config ─────────────────────────────────────────────────────────────────────
config:
  corsAllowedOrigins: "https://your-frontend-domain.com"
  appUrl: "https://your-frontend-domain.com"
  openaiChatModel: "gpt-4o-mini"
  openaiEmbeddingModel: "text-embedding-3-small"
  storageType: "s3"
  s3Region: "us-east-1"
  rateLimitPerMinute: "30"
