version: '3.8'

# Production docker-compose — all secrets via env vars, never hardcoded.
# Create a .env file from .env.example before running:
#   cp .env.example .env && nano .env
# Then: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docai}
      POSTGRES_USER: ${POSTGRES_USER:-docai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - docai-net

  document-ingestor:
    build:
      context: ./document-ingestor
      dockerfile: Dockerfile
    container_name: docai-ingestor
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-docai}
      SPRING_DATABASE_USERNAME: ${POSTGRES_USER:-docai}
      SPRING_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      INGEST_DIR: /app/watched-docs
      UPLOAD_DIR: /app/uploads
    volumes:
      - ingestor_watched:/app/watched-docs
      - ingestor_uploads:/app/uploads
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - docai-net

  documentation-bot:
    build:
      context: ./documentation-bot
      dockerfile: Dockerfile
    container_name: docai-bot
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-docai}
      SPRING_DATABASE_USERNAME: ${POSTGRES_USER:-docai}
      SPRING_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - docai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8082}
        VITE_INGESTOR_URL: ${VITE_INGESTOR_URL:-http://localhost:8081}
    container_name: docai-frontend
    ports:
      - "3000:80"
    depends_on:
      - documentation-bot
      - document-ingestor
    restart: unless-stopped
    networks:
      - docai-net

volumes:
  postgres_data:
  ingestor_watched:
  ingestor_uploads:

networks:
  docai-net:
    driver: bridge
