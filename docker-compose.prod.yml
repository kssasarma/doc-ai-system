# Production docker-compose — all secrets via env vars, never hardcoded.
# Create a .env file from .env.example before running:
#   cp .env.example .env && nano .env
# Then: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docai}
      POSTGRES_USER: ${POSTGRES_USER:-docai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No ports: block — the bot/ingestor reach Postgres over the internal docai-net network
    # (postgres:5432), so publishing this to the host would only expose the database to
    # anything that can reach the host, including the public internet on most cloud VMs with
    # no additional firewalling. For one-off local psql access, use
    # `docker compose -f docker-compose.prod.yml exec postgres psql -U $POSTGRES_USER` instead
    # of a published port, or add a temporary `-p 127.0.0.1:5432:5432` override.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - docai-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  document-ingestor:
    build:
      context: ./document-ingestor
      dockerfile: Dockerfile
    container_name: docai-ingestor
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-docai}
      SPRING_DATABASE_USERNAME: ${POSTGRES_USER:-docai}
      SPRING_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      JWT_SECRET: ${JWT_SECRET}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Point at your own S3-compatible object store — a real production deployment should not
      # bundle a single-node MinIO into this compose file's own lifecycle. No defaults for
      # endpoint/credentials: set them explicitly in .env, same as JWT_SECRET/POSTGRES_PASSWORD.
      STORAGE_TYPE: s3
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-false}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      # documentation-bot's V11 migration adds users.tenant_id, which this service's own V7
      # migration backfills from — must not run before that column exists.
      documentation-bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - docai-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G

  documentation-bot:
    build:
      context: ./documentation-bot
      dockerfile: Dockerfile
    container_name: docai-bot
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-docai}
      SPRING_DATABASE_USERNAME: ${POSTGRES_USER:-docai}
      SPRING_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      JWT_SECRET: ${JWT_SECRET}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@docs-inator.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
      # No REDIS_HOST here, deliberately: rate limiting and the embedding cache both fall back to
      # single-node in-memory state when Redis isn't configured (see RateLimitFilter/
      # EmbeddingCacheService's @ConditionalOnProperty-gated beans) — and this compose file only
      # ever runs exactly one documentation-bot container, so there's nothing to "distribute"
      # across. If you scale this service horizontally (`docker compose up --scale
      # documentation-bot=N`), add a redis service back (see docker-compose.yml's dev setup) and
      # set REDIS_HOST/REDIS_PORT here — otherwise each replica's rate limit/cache is independent.
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      INGESTOR_INTERNAL_URL: ${INGESTOR_INTERNAL_URL:-http://document-ingestor:8081}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - docai-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 768M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Left empty on purpose: the built-in nginx reverse proxy (BOT_UPSTREAM/INGESTOR_UPSTREAM
      # below, defaulted in the Dockerfile to the compose service names) makes the frontend
      # single-origin, so the bundle should call relative /api paths, not an absolute URL that
      # would point every remote visitor's browser at their own localhost.
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_INGESTOR_URL: ${VITE_INGESTOR_URL:-}
    container_name: docai-frontend
    ports:
      - "3000:80"
    depends_on:
      - documentation-bot
      - document-ingestor
    restart: unless-stopped
    networks:
      - docai-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  postgres_data:

networks:
  docai-net:
    driver: bridge
