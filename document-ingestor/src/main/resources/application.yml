spring:
  application:
    name: document-ingestor

  datasource:
    url: ${SPRING_DATABASE_URL:jdbc:postgresql://localhost:5432/docai}
    username: ${SPRING_DATABASE_USERNAME:postgres}
    password: ${SPRING_DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        hypersistence.utils.enable_types_contributor: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_ingestor
    baseline-on-migrate: true
    # Flyway never actually ran in this environment before now (missing spring-boot-starter-flyway —
    # Spring Boot 4 split the autoconfiguration out of flyway-core). The live schema already matches
    # V1-V6 (previously applied via Hibernate ddl-auto=update, before it was switched to 'none').
    # Baselining at 6 makes only V7+ pending here; baseline is ignored entirely for a genuinely
    # empty/fresh database, where migrate() still runs V1 onward normally.
    baseline-version: 6

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          # Was "gpt-4o-embedding-4k" — not a real OpenAI model name; this default silently broke
          # any deployment that didn't override it via OPENAI_EMBEDDING_MODEL (dev compose already
          # did, masking the bug there). text-embedding-3-small matches the bot service's default
          # and is what documentation-bot's query-side embedding actually expects to match against.
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          encodingFormat: float

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_UPLOAD_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}

server:
  port: 8081

app:
  jwt:
    # Default is for local dev only — always set JWT_SECRET in production
    secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItZG9jYWktc3lzdGVtLWp3dC10b2tlbnMtMjAyNA==}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  secrets:
    # AES-256 key (base64, 32 bytes) for encrypting Confluence/Notion integration tokens at rest.
    # Shared with documentation-bot's SECRETS_ENCRYPTION_KEY (same key, same scheme) — same
    # sharing convention already used for JWT_SECRET. Optional here (dev generates an ephemeral
    # key); required in prod — see application-prod.yml. Generate with: openssl rand -base64 32
    encryption-key: ${SECRETS_ENCRYPTION_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      # Explicit rather than relying on Spring Boot's Kubernetes auto-detection (which only
      # enables these when KUBERNETES_SERVICE_HOST is present) — the split liveness/readiness
      # groups below must respond the same way everywhere the k8s manifests point probes at
      # them, and this makes that independent of the deployment platform.
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

ingestor:
  chunk-size: 800
  chunk-overlap: 100
  parallel-processing: true
  max-threads: 4
  # A document stuck in PROCESSING longer than this (pod died mid-ingestion, etc.) is reaped —
  # marked FAILED so it becomes eligible for retrigger/reprocess-failed instead of stuck forever.
  stuck-processing-timeout-minutes: ${STUCK_PROCESSING_TIMEOUT_MINUTES:30}
  stuck-processing-check-interval-ms: ${STUCK_PROCESSING_CHECK_INTERVAL_MS:300000}
  # Phase 3 — files live on S3-compatible storage (MinIO in this deployment), never on this
  # container's own disk. "s3" is the only supported backend (see DocumentStorageService); a
  # future backend is a new implementation gated the same way, not a config toggle back to disk.
  storage:
    type: ${STORAGE_TYPE:s3}
    s3:
      bucket: ${S3_BUCKET:docai-documents}
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin123}
      # MinIO needs path-style (http://host:port/bucket/key); real AWS S3 uses virtual-hosted
      # style (https://bucket.s3.amazonaws.com/key) — set this to false there.
      path-style-access: ${S3_PATH_STYLE_ACCESS:true}
  security:
    # SSRF guard (SafeUrlValidator) for server-side fetches of caller-supplied URLs (webhook
    # download URLs, Confluence API calls). https-only by default; these hosts are additionally
    # allowed over plain http (dev/test convenience only — never add a real external host here).
    http-allowed-hosts: ${SSRF_HTTP_ALLOWED_HOSTS:localhost,127.0.0.1}
    # Confluence site URLs (registered via POST /api/connectors/confluence/token) must resolve to
    # a host ending in one of these suffixes, closing the SSRF risk of a malicious/compromised
    # admin pointing sync at an arbitrary internal host with the stored bearer token attached.
    confluence-host-allowlist: ${CONFLUENCE_HOST_ALLOWLIST:.atlassian.net}
  webhook:
    # Shared secret CI/CD systems use to sign POST /api/v1/ingest/webhook request bodies
    # (X-Webhook-Signature: sha256=<hmac>) — see WebhookHmacAuthFilter. Unset in dev disables
    # signature verification (falls back to requiring an ADMIN JWT); set in prod.
    hmac-secret: ${WEBHOOK_HMAC_SECRET:}
  internal:
    # Shared secret documentation-bot signs its server-to-server calls with (currently just the
    # "open citation" download-url lookup) — see InternalServiceAuthFilter. Must match the same
    # env var configured on documentation-bot. Unset disables the internal API entirely.
    service-secret: ${INTERNAL_SERVICE_SECRET:}

