spring:
  application:
    name: document-ingestor

  datasource:
    url: ${SPRING_DATABASE_URL:jdbc:postgresql://localhost:5432/docai}
    username: ${SPRING_DATABASE_USERNAME:postgres}
    password: ${SPRING_DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        hypersistence.utils.enable_types_contributor: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_ingestor
    baseline-on-migrate: true
    baseline-version: 0

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:gpt-4o-embedding-4k}
          encodingFormat: float

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_UPLOAD_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}

server:
  port: 8081

app:
  jwt:
    # Default is for local dev only — always set JWT_SECRET in production
    secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItZG9jYWktc3lzdGVtLWp3dC10b2tlbnMtMjAyNA==}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  # Phase 7.5 — AWS credentials (used when ingestor.storage.type=s3)
  aws:
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

ingestor:
  watch-directory: ${INGEST_DIR:./watched-docs}
  upload-directory: ${UPLOAD_DIR:./uploads}
  polling-interval-ms: 5000
  chunk-size: 800
  chunk-overlap: 100
  parallel-processing: true
  max-threads: 4
  # Phase 7.5 — storage backend: local (default) or s3
  storage:
    type: ${STORAGE_TYPE:local}
    s3:
      bucket: ${S3_BUCKET:docai-documents}

