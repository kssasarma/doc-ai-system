spring:
  application:
    name: document-ingestor

  datasource:
    url: ${SPRING_DATABASE_URL:jdbc:postgresql://localhost:5432/docai}
    username: ${SPRING_DATABASE_USERNAME:postgres}
    password: ${SPRING_DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        hypersistence.utils.enable_types_contributor: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_ingestor
    baseline-on-migrate: true
    # Flyway never actually ran in this environment before now (missing spring-boot-starter-flyway —
    # Spring Boot 4 split the autoconfiguration out of flyway-core). The live schema already matches
    # V1-V6 (previously applied via Hibernate ddl-auto=update, before it was switched to 'none').
    # Baselining at 6 makes only V7+ pending here; baseline is ignored entirely for a genuinely
    # empty/fresh database, where migrate() still runs V1 onward normally.
    baseline-version: 6

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:gpt-4o-embedding-4k}
          encodingFormat: float

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_UPLOAD_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}

server:
  port: 8081

app:
  jwt:
    # Default is for local dev only — always set JWT_SECRET in production
    secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItZG9jYWktc3lzdGVtLWp3dC10b2tlbnMtMjAyNA==}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  # Phase 7.5 — AWS credentials (used when ingestor.storage.type=s3)
  aws:
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

ingestor:
  chunk-size: 800
  chunk-overlap: 100
  parallel-processing: true
  max-threads: 4
  # Phase 3 — files live on S3-compatible storage (MinIO in this deployment), never on this
  # container's own disk. "s3" is the only supported backend (see DocumentStorageService); a
  # future backend is a new implementation gated the same way, not a config toggle back to disk.
  storage:
    type: ${STORAGE_TYPE:s3}
    s3:
      bucket: ${S3_BUCKET:docai-documents}
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin123}
      # MinIO needs path-style (http://host:port/bucket/key); real AWS S3 uses virtual-hosted
      # style (https://bucket.s3.amazonaws.com/key) — set this to false there.
      path-style-access: ${S3_PATH_STYLE_ACCESS:true}

