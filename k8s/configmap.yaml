apiVersion: v1
kind: ConfigMap
metadata:
  name: doc-ai-config
  namespace: doc-ai
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATABASE_URL: "jdbc:postgresql://postgres-service:5432/docai"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  OPENAI_BASE_URL: "https://api.openai.com"
  OPENAI_CHAT_MODEL: "gpt-4o-mini"
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
  CORS_ALLOWED_ORIGINS: "https://your-domain.com"
  APP_URL: "https://your-domain.com"
  STORAGE_TYPE: "s3"
  # Real AWS S3, not MinIO, in-cluster — leave S3_ENDPOINT empty so the SDK resolves the
  # standard regional endpoint, and keep virtual-hosted (non-path-style) addressing.
  S3_REGION: "us-east-1"
  S3_ENDPOINT: ""
  S3_PATH_STYLE_ACCESS: "false"
  RATE_LIMIT_PER_MINUTE: "30"
