# Example External Secrets Operator setup backed by AWS Secrets Manager — see SECRETS.md
# "Option B". Swap the SecretStore's `provider` block for gcpsm/azurekv/vault/etc. to target a
# different backend; the ExternalSecret's `data[].remoteRef.key` values are just names you choose
# when you create the entries in your secret store, matched up to the doc-ai-secrets keys the
# Deployments expect via `remoteRef.property` (or the whole entry if it's a single-value secret).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: doc-ai-secret-store
  namespace: doc-ai
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # IRSA (IAM Roles for Service Accounts) — no static AWS credentials stored in-cluster.
        jwt:
          serviceAccountRef:
            name: doc-ai-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doc-ai-secrets
  namespace: doc-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doc-ai-secret-store
    kind: SecretStore
  target:
    name: doc-ai-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATABASE_USERNAME
      remoteRef:
        key: doc-ai/database
        property: username
    - secretKey: SPRING_DATABASE_PASSWORD
      remoteRef:
        key: doc-ai/database
        property: password
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: doc-ai/openai-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: doc-ai/anthropic-api-key
    - secretKey: JWT_SECRET
      remoteRef:
        key: doc-ai/jwt-secret
    - secretKey: SEED_ADMIN_PASSWORD
      remoteRef:
        key: doc-ai/seed-admin-password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: doc-ai/redis-password
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: doc-ai/s3
        property: access_key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: doc-ai/s3
        property: secret_key
    - secretKey: S3_BUCKET
      remoteRef:
        key: doc-ai/s3
        property: bucket
    - secretKey: MAIL_USERNAME
      remoteRef:
        key: doc-ai/mail
        property: username
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: doc-ai/mail
        property: password
