# IMPORTANT: Replace <base64-encoded-value> with actual base64-encoded secrets.
# Generate with: echo -n 'value' | base64
# Never commit real secrets — use sealed-secrets, external-secrets, or Vault in production.
apiVersion: v1
kind: Secret
metadata:
  name: doc-ai-secrets
  namespace: doc-ai
type: Opaque
data:
  SPRING_DATABASE_USERNAME: <base64-encoded-value>
  SPRING_DATABASE_PASSWORD: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  ANTHROPIC_API_KEY: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  REDIS_PASSWORD: <base64-encoded-value>
  AWS_ACCESS_KEY_ID: <base64-encoded-value>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-value>
  S3_BUCKET: <base64-encoded-value>
  MAIL_USERNAME: <base64-encoded-value>
  MAIL_PASSWORD: <base64-encoded-value>
