# DEV/LOCAL CLUSTERS ONLY (kind, minikube, a personal namespace). Applying this as-is against a
# shared or production cluster puts every credential below in cleartext in git history and in
# `kubectl get secret -o yaml` output.
#
# For a shared/production cluster, use Sealed Secrets or External Secrets Operator instead — see
# SECRETS.md in this directory for setup steps and sealed-secret.example.yaml /
# external-secret.example.yaml for the manifests each approach produces or requires. Both end up
# creating the same `doc-ai-secrets` Secret the Deployments already reference.
#
# For this file specifically: replace <base64-encoded-value> with actual base64-encoded secrets.
# Generate with: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: doc-ai-secrets
  namespace: doc-ai
type: Opaque
data:
  SPRING_DATABASE_USERNAME: <base64-encoded-value>
  SPRING_DATABASE_PASSWORD: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  ANTHROPIC_API_KEY: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  SEED_ADMIN_PASSWORD: <base64-encoded-value>
  REDIS_PASSWORD: <base64-encoded-value>
  S3_ACCESS_KEY: <base64-encoded-value>
  S3_SECRET_KEY: <base64-encoded-value>
  S3_BUCKET: <base64-encoded-value>
  MAIL_USERNAME: <base64-encoded-value>
  MAIL_PASSWORD: <base64-encoded-value>
