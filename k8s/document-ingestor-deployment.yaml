apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-ingestor
  namespace: doc-ai
  labels:
    app: document-ingestor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-ingestor
  template:
    metadata:
      labels:
        app: document-ingestor
    spec:
      # document-ingestor and documentation-bot share one Postgres database, each running its own
      # Flyway migrations independently. document-ingestor's V4 migration has a hard FK dependency
      # on the users(id) table, which documentation-bot's migrations own — on a fresh database,
      # starting both pods together races document-ingestor's migration against table creation it
      # depends on and can crash-loop it. This waits for documentation-bot's readiness probe (which
      # only turns healthy after its own Flyway run completes, since that happens during context
      # refresh, before the ApplicationReadyEvent readiness probes key off) before document-ingestor
      # starts its container and runs its own migrations.
      initContainers:
        - name: wait-for-bot-migrations
          image: curlimages/curl:8.11.0
          command:
            - sh
            - -c
            - |
              until curl -sf http://documentation-bot-service:8082/actuator/health/readiness; do
                echo "Waiting for documentation-bot (owns the shared users/tenants tables) to become ready…"
                sleep 5
              done
              echo "documentation-bot is ready — proceeding."
      containers:
        - name: document-ingestor
          image: your-registry/document-ingestor:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: doc-ai-config
            - secretRef:
                name: doc-ai-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: document-ingestor-service
  namespace: doc-ai
spec:
  selector:
    app: document-ingestor
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-ingestor-hpa
  namespace: doc-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-ingestor
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
