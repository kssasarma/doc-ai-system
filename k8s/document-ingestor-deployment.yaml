apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-ingestor
  namespace: doc-ai
  labels:
    app: document-ingestor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-ingestor
  template:
    metadata:
      labels:
        app: document-ingestor
    spec:
      containers:
        - name: document-ingestor
          image: your-registry/document-ingestor:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: doc-ai-config
            - secretRef:
                name: doc-ai-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: document-ingestor-service
  namespace: doc-ai
spec:
  selector:
    app: document-ingestor
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-ingestor-hpa
  namespace: doc-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-ingestor
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
