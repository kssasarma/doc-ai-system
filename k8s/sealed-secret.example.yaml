# Example shape of the output `kubeseal` produces — see SECRETS.md "Option A" for how to
# generate your own from real values. This file with real `encryptedData` is safe to commit
# (only the Sealed Secrets controller's private key in the target cluster can decrypt it), but
# this particular example is a template, not a real sealed secret — the placeholders below won't
# decrypt to anything.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: doc-ai-secrets
  namespace: doc-ai
spec:
  encryptedData:
    SPRING_DATABASE_USERNAME: <produced-by-kubeseal>
    SPRING_DATABASE_PASSWORD: <produced-by-kubeseal>
    OPENAI_API_KEY: <produced-by-kubeseal>
    ANTHROPIC_API_KEY: <produced-by-kubeseal>
    JWT_SECRET: <produced-by-kubeseal>
    SEED_ADMIN_PASSWORD: <produced-by-kubeseal>
    REDIS_PASSWORD: <produced-by-kubeseal>
    S3_ACCESS_KEY: <produced-by-kubeseal>
    S3_SECRET_KEY: <produced-by-kubeseal>
    S3_BUCKET: <produced-by-kubeseal>
    MAIL_USERNAME: <produced-by-kubeseal>
    MAIL_PASSWORD: <produced-by-kubeseal>
  template:
    metadata:
      name: doc-ai-secrets
      namespace: doc-ai
    type: Opaque
