<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!-- No dedicated PNG icon asset exists yet — reusing the SVG favicon here is a stopgap.
         iOS Safari's "Add to Home Screen" prefers a PNG; this still renders (modern iOS accepts
         SVG touch icons), just without the guaranteed cross-version support a real PNG would have. -->
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Docs-inator - AI-Powered Documentation Assistant. Get instant answers to your documentation questions with our intelligent chatbot." />
    <meta name="keywords" content="documentation, chatbot, AI, assistant, docs, help" />
    <meta name="author" content="Docs-inator" />
    <meta property="og:title" content="Docs-inator - AI Documentation Assistant" />
    <meta property="og:description" content="Get instant answers to your documentation questions with our intelligent chatbot" />
    <meta property="og:type" content="website" />
    <link rel="preload" href="/src/config/app.json" as="fetch" crossorigin="anonymous" />
    <title>Docs-inator - AI Documentation Assistant</title>
    <script>
      // Applied synchronously, before first paint, to avoid a flash of the wrong theme —
      // mirrors the resolution logic in src/context/ThemeContext.tsx.
      (function () {
        try {
          var mode = localStorage.getItem('docai_theme') || 'system';
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
